name: Testler

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dart-testler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
      - run: flutter pub get
      - run: flutter test

  node-testler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        working-directory: functions
      - run: npm test
        working-directory: functions

  rules-testler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g firebase-tools
      - run: npm ci
        working-directory: rules-tests
      - run: firebase emulators:exec --only firestore --project rules-test-iste-v3 "node rules-tests/test.mjs"
