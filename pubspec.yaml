name: iste_v3
description: "İSTE - Yurt dışından ürün getirme uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ─────────────────────────────────────
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # ── Model (Freezed) ──────────────────────────────────────
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # ── Firebase ─────────────────────────────────────────────
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3

  # ── Google Sign In ───────────────────────────────────────
  google_sign_in: ^6.2.2

  # ── Navigation ───────────────────────────────────────────
  go_router: ^14.8.1

  # ── UI ───────────────────────────────────────────────────
  google_fonts: ^6.3.3
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # ── Utilities ────────────────────────────────────────────
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  shared_preferences: ^2.5.5

  cupertino_icons: ^1.0.8
  flutter_cache_manager: ^3.4.1
  cloud_functions: ^6.2.0
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ── Code Generators ──────────────────────────────────────
  build_runner: ^2.4.14
  riverpod_generator: ^4.0.0+1
  freezed: ^3.2.3
  json_serializable: ^6.11.2

flutter:
  uses-material-design: true

  assets:
    - assets/splash/
    - assets/images/

# ── Splash Ekranı ────────────────────────────────────────────────────────────
flutter_native_splash:
  color: "#0D0D0D"
  color_dark: "#0D0D0D"

  image: assets/splash/iste_splash.png
  image_dark: assets/splash/iste_splash.png

  android_12:
    image: assets/splash/iste_splash.png
    color: "#0D0D0D"
    image_dark: assets/splash/iste_splash.png
    color_dark: "#0D0D0D"
    icon_background_color: "#0D0D0D"
    icon_background_color_dark: "#0D0D0D"

  fullscreen: false
  android: true
  ios: true
  web: false